name: Build Python package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

    env:
      CC: gcc-9
      CXX: g++-9
      NUM_CORES: "2"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            cmake \
            g++-9 \
            gcc-9 \
            libboost-dev \
            libboost-thread-dev \
            libgmp-dev \
            libmpfr-dev \
            patchelf \
            unzip \
            zip

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade build pip setuptools wheel
          python -m pip install --requirement python/requirements.txt

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Bundle shared-library dependencies
        run: python docker/patches/patch_wheel.py dist/*.whl

      - name: Install and test wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -c "import pymesh; import sys; sys.exit(0 if pymesh.test().wasSuccessful() else 1)"

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: pymesh2-python-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error
