name: Build Python package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            build-identifier: cp310-manylinux_x86_64
          - python-version: "3.11"
            build-identifier: cp311-manylinux_x86_64
          - python-version: "3.12"
            build-identifier: cp312-manylinux_x86_64

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==4.1.0

      - name: Build and test manylinux wheel
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.build-identifier }}

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: pymeshv2-python-${{ matrix.python-version }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: pymeshv2-python-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
